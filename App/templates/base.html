<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ben Barak Wine Initiative{% endblock %}</title>
    <meta name="description" content="{% block description %}The Ben Barak Wine Initiative — Israeli boutique winemaking with purpose. Memorial and charity wine projects, and premium wine curation for private and corporate clients.{% endblock %}">
    <link rel="canonical" href="https://benbarakwine.com{{ request.path if request.path != '/' else '' }}">

    <!-- Open Graph (LinkedIn, WhatsApp, Facebook) -->
    <meta property="og:site_name" content="Ben Barak Wine Initiative">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ self.description() }}">
    <meta property="og:url" content="https://benbarakwine.com{{ request.path if request.path != '/' else '' }}">
    <meta property="og:image" content="https://benbarakwine.com{{ url_for('static', filename='images/web/og-share.jpg') }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Ben Barak Wine Initiative — where wine meets purpose">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ self.title() }}">
    <meta name="twitter:description" content="{{ self.description() }}">
    <meta name="twitter:image" content="https://benbarakwine.com{{ url_for('static', filename='images/web/og-share.jpg') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/">Ben Barak Wine Initiative</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/vintages">Vintages</a></li>
                <li><a href="/curation">Wine Curation</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Ben Barak Wine Initiative. All rights reserved.</p>
    </footer>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/972506286089" class="whatsapp-float" target="_blank" title="Chat on WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="32" height="32">
            <path fill="#fff" d="M4.9 43.3l2.7-9.9C5.9 30.7 5 27.4 5 24 5 13.5 13.5 5 24 5s19 8.5 19 19-8.5 19-19 19c-3.3 0-6.4-.8-9.1-2.3L4.9 43.3z"/>
            <path fill="#25D366" d="M24 7c-9.4 0-17 7.6-17 17 0 3.1.8 6 2.3 8.6l.4.7-1.7 6.3 6.5-1.7.7.4C17.9 39.7 20.9 40.9 24 41c9.4 0 17-7.6 17-17S33.4 7 24 7z"/>
            <path fill="#fff" d="M19.3 16c-.4-.9-.8-.9-1.2-.9h-1c-.3 0-.9.1-1.4.6s-1.8 1.8-1.8 4.3 1.9 5 2.1 5.3 3.7 5.9 9.1 8c4.5 1.8 5.4 1.4 6.4 1.3s3.2-1.3 3.6-2.6.4-2.3.3-2.6c-.2-.2-.6-.4-1.2-.7s-3.8-1.9-4.4-2.1-1-.3-1.5.3-1.7 2.1-2.1 2.6-.8.5-1.4.2-2.8-1-5.3-3.3c-2-1.7-3.3-3.9-3.7-4.5s0-1 .3-1.3c.3-.3.6-.8.9-1.1.3-.4.4-.6.6-1 .2-.4.1-.8-.1-1.1z"/>
        </svg>
    </a>

    <script>
        // Keep the WhatsApp button from sliding over the footer
        (function () {
            const btn = document.querySelector('.whatsapp-float');
            const footer = document.querySelector('footer');
            function adjust() {
                const rect = footer.getBoundingClientRect();
                const overlap = window.innerHeight - rect.top;
                btn.style.bottom = (overlap > 0 ? overlap + 16 : 32) + 'px';
            }
            window.addEventListener('scroll', adjust, { passive: true });
            window.addEventListener('resize', adjust);
            adjust();
        })();
    </script>
</body>
</html>
