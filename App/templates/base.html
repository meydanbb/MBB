<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ben Barak Wine Initiative{% endblock %}</title>
    <meta name="description" content="{% block description %}The Ben Barak Wine Initiative — Israeli boutique winemaking with purpose. Memorial and charity wine projects, and premium wine curation for private and corporate clients.{% endblock %}">
    <link rel="canonical" href="https://benbarakwine.com{{ request.path if request.path != '/' else '' }}">

    <!-- Open Graph (LinkedIn, WhatsApp, Facebook) -->
    <meta property="og:site_name" content="Ben Barak Wine Initiative">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ self.description() }}">
    <meta property="og:url" content="https://benbarakwine.com{{ request.path if request.path != '/' else '' }}">
    <meta property="og:image" content="https://benbarakwine.com{{ url_for('static', filename='images/web/og-share.jpg') }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Ben Barak Wine Initiative — where wine meets purpose">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ self.title() }}">
    <meta name="twitter:description" content="{{ self.description() }}">
    <meta name="twitter:image" content="https://benbarakwine.com{{ url_for('static', filename='images/web/og-share.jpg') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="/">Ben Barak Wine Initiative</a>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/vintages">Vintages</a></li>
                <li><a href="/curation">Wine Curation</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Ben Barak Wine Initiative. All rights reserved.</p>
    </footer>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/972506286089" class="whatsapp-float" target="_blank" title="Chat on WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="30" height="30">
            <path fill="#fff" d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
        </svg>
    </a>

    <script>
        // Keep the WhatsApp button from sliding over the footer
        (function () {
            const btn = document.querySelector('.whatsapp-float');
            const footer = document.querySelector('footer');
            function adjust() {
                const rect = footer.getBoundingClientRect();
                const overlap = window.innerHeight - rect.top;
                btn.style.bottom = (overlap > 0 ? overlap + 16 : 32) + 'px';
            }
            window.addEventListener('scroll', adjust, { passive: true });
            window.addEventListener('resize', adjust);
            adjust();
        })();
    </script>
</body>
</html>
